<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Guidance - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px;
        }
        h2 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .tabs { display: flex; margin-bottom: 30px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            border-bottom: 3px solid #ddd; color: #999; font-weight: 600;
        }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .error { color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center; }
        .success { color: #27ae60; font-size: 14px; margin-top: 10px; text-align: center; }
        .form { display: none; }
        .form.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Career Guidance</h2>
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('signup')">Signup</div>
        </div>

        <div id="loginForm" class="form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button onclick="login()">Login</button>
            <div id="loginMsg"></div>
        </div>

        <div id="signupForm" class="form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Min 6 characters">
            </div>
            <button onclick="signup()">Create Account</button>
            <div id="signupMsg"></div>
        </div>
    </div>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAyVcmmVFHwYpn_ZZrYdQfOMmG-WPwQl6o",
    authDomain: "career-guidance-203da.firebaseapp.com",
    projectId: "career-guidance-203da",
    storageBucket: "career-guidance-203da.firebasestorage.app",
    messagingSenderId: "1428869256",
    appId: "1:1428869256:web:254bb5f56b857c42100f3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.showTab = (tab) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    
    if (tab === 'login') {
      document.querySelector('.tab:nth-child(1)').classList.add('active');
      document.getElementById('loginForm').classList.add('active');
    } else {
      document.querySelector('.tab:nth-child(2)').classList.add('active');
      document.getElementById('signupForm').classList.add('active');
    }
  };

  window.login = () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('loginMsg');
    
    if (!email || !password) {
      msgDiv.innerHTML = '<div class="error">Enter email and password</div>';
      return;
    }

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msgDiv.innerHTML = '<div class="success">Login successful! Redirecting...</div>';
        setTimeout(() => window.location.href = 'index.html', 1000);
      })
      .catch((error) => {
        msgDiv.innerHTML = `<div class="error">${error.message}</div>`;
      });
  };

  window.signup = () => {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const msgDiv = document.getElementById('signupMsg');
    
    if (!name || !email || !password) {
      msgDiv.innerHTML = '<div class="error">Fill all fields</div>';
      return;
    }

    if (password.length < 6) {
      msgDiv.innerHTML = '<div class="error">Password must be at least 6 characters</div>';
      return;
    }

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        return updateProfile(userCredential.user, { displayName: name });
      })
      .then(() => {
        msgDiv.innerHTML = '<div class="success">Account created! Redirecting...</div>';
        setTimeout(() => window.location.href = 'index.html', 1000);
      })
      .catch((error) => {
        msgDiv.innerHTML = `<div class="error">${error.message}</div>`;
      });
  };
</script>
   </body>
</html>
